<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{general/fragmentos :: head}"></head>

    <body>

        <header th:replace="~{general/fragmentos :: header}"></header>

        <div th:if="${param.success}" class="alert alert-success">
            Venta registrada correctamente
        </div>

        <div class="container mt-4">

            <h2>Panel del Vendedor</h2>

            <div style="display:flex; gap:15px; margin-top:20px; margin-bottom:30px;">

                <a th:href="@{/vendedor/dashboard(idVendedor=2)}"
                   style="flex:1; padding:15px; background:#0d6efd; color:white; text-align:center; text-decoration:none; border-radius:6px;">
                    Dashboard
                </a>

                <a th:href="@{/vendedor/nuevaVenta(idVendedor=2)}"
                   style="flex:1; padding:15px; background:#198754; color:white; text-align:center; text-decoration:none; border-radius:6px;">
                    Nueva Venta
                </a>

                <a th:href="@{/vendedor/misVentas(idVendedor=2)}"
                   style="flex:1; padding:15px; background:#dc3545; color:white; text-align:center; text-decoration:none; border-radius:6px;">
                    Mis Ventas
                </a>

            </div>

            <form th:action="@{/vendedor/registrarVenta}" method="post">

                <input type="hidden" name="idVendedor" value="2"/>

                <div style="margin-bottom:15px;">
                    <label>Cliente</label>
                    <select class="form-control" name="idCliente" required>
                        <option value="">Seleccionar cliente</option>
                        <option th:each="c : ${clientes}"
                                th:value="${c.idCliente}"
                                th:text="${c.idCliente + ' - ' + c.nombre}">
                        </option>
                    </select>
                </div>

                <div style="margin-bottom:15px;">
                    <label>Producto</label>
                    <select class="form-control" name="idProducto" id="productoSelect" required>
                        <option value="">Seleccionar producto</option>
                        <option th:each="p : ${productos}"
                                th:value="${p.idProducto}"
                                th:data-precio="${p.precio}"
                                th:text="${p.codigo + ' - ' + p.nombre}">
                        </option>
                    </select>
                </div>

                <div style="margin-bottom:15px;">
                    <label>Cantidad</label>
                    <input type="number" class="form-control" name="cantidad" min="1" required>
                </div>

                <div style="margin-bottom:15px;">
                    <label>Precio</label>
                    <input type="number" step="0.01" class="form-control" name="precio" id="precioInput" readonly required>
                </div>

                <button type="submit" class="btn btn-success"
                        onclick="return confirm('¿Registrar esta venta?')">
                    Registrar Venta
                </button>

            </form>

        </div>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>

        <script>
            const select = document.getElementById('productoSelect');
            const precioInput = document.getElementById('precioInput');

            select.addEventListener('change', function () {
                const precio = this.options[this.selectedIndex].getAttribute('data-precio');
                precioInput.value = precio;
            });
        </script>

    </body>
</html>
