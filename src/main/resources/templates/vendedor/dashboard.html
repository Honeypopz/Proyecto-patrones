<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{general/fragmentos :: head}"></head>

    <body>

        <header th:replace="~{general/fragmentos :: header}"></header>

        <div class="container mt-4">

            <h2>Panel del Vendedor</h2>

            <div style="display:flex; gap:15px; margin-top:20px; margin-bottom:30px;">

                <a th:href="@{/vendedor/dashboard(idVendedor=2)}"
                   style="flex:1; padding:15px; background:#0d6efd; color:white; text-align:center; text-decoration:none; border-radius:6px;">
                    Dashboard
                </a>

                <a th:href="@{/vendedor/nuevaVenta(idVendedor=2)}"
                   style="flex:1; padding:15px; background:#198754; color:white; text-align:center; text-decoration:none; border-radius:6px;">
                    Nueva Venta
                </a>

                <a th:href="@{/vendedor/misVentas(idVendedor=2)}"
                   style="flex:1; padding:15px; background:#dc3545; color:white; text-align:center; text-decoration:none; border-radius:6px;">
                    Mis Ventas
                </a>

            </div>

            <h3>Resumen de Ventas</h3>

            <div style="display:flex; gap:20px; margin-top:20px;">

                <div style="flex:1; background:#f2f2f2; padding:20px; border-radius:8px; text-align:center;">
                    <h4>Total ventas</h4>
                    <h2 th:text="${totalVentas}">0</h2>
                </div>

                <div style="flex:1; background:#f2f2f2; padding:20px; border-radius:8px; text-align:center;">
                    <h4>Total vendido</h4>
                    <h2 th:text="${'₡ ' + totalVendido}">₡0</h2>
                </div>

                <div style="flex:1; background:#f2f2f2; padding:20px; border-radius:8px; text-align:center;">
                    <h4>Comisión (6%)</h4>
                    <h2 th:text="${'₡ ' + comision}">₡0</h2>
                </div>

            </div>

        </div>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>

    </body>
</html>
