<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{general/fragmentos :: head}"></head>

    <body>

        <header th:replace="~{general/fragmentos :: header}"></header>

        <div class="container mt-4">

            <h2>Panel del Vendedor</h2>

            <div style="display:flex; gap:15px; margin-top:20px; margin-bottom:30px;">

                <a th:href="@{/vendedor/dashboard(idVendedor=2)}"
                   style="flex:1; padding:15px; background:#0d6efd; color:white; text-align:center; text-decoration:none; border-radius:6px;">
                    Dashboard
                </a>

                <a th:href="@{/vendedor/nuevaVenta(idVendedor=2)}"
                   style="flex:1; padding:15px; background:#198754; color:white; text-align:center; text-decoration:none; border-radius:6px;">
                    Nueva Venta
                </a>

                <a th:href="@{/vendedor/misVentas(idVendedor=2)}"
                   style="flex:1; padding:15px; background:#dc3545; color:white; text-align:center; text-decoration:none; border-radius:6px;">
                    Mis Ventas
                </a>

            </div>

            <h3>Mis Ventas</h3>

            <table class="table table-striped">

                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Producto</th>
                        <th>Fecha</th>
                        <th>Total</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="v : ${ventas}">

                        
                        <td th:text="${v.cliente.nombre}">Cliente</td>

                        
                        <td>
                            <span th:each="d, stat : ${v.detalles}">
                                <span th:text="${d.producto.nombre}"></span>
                                <span th:if="${!stat.last}">, </span>
                            </span>
                        </td>

                        
                        <td th:text="${v.fecha}">12/03/2026</td>

                        
                        <td th:text="${'$' + v.total}">₡25000</td>
                        
                    </tr>

                </tbody>

            </table>

        </div>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>

    </body>
</html>
