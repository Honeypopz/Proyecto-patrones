<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="general/fragmentos :: head"></head>

    <body>

        <header th:replace="general/fragmentos :: header"></header>

        <div class="container">

            <h2>Panel Admin</h2>


            <div th:replace="general/fragmentos :: adminHead"></div>

            <h4>Reportes del Sistema</h4>

            <div class="row">

                <div class="col-md-6">
                    <div class="card text-center">
                        <div class="card-body">
                            <h5>Ventas del Mes</h5>
                            <h2 th:text="${'$' + ventasMes}">₡4500</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card text-center">
                        <div class="card-body">
                            <h5>Ventas Hoy</h5>
                            <h2 th:text="${'$' + ventasHoy}">₡1200</h2>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </body>
</html>
