<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="general/fragmentos :: head"></head>

    <body>

        <header th:replace="general/fragmentos :: header"></header>

        <div class="container">

            <h2>Panel Admin</h2>

<div th:replace="general/fragmentos :: adminHead"></div>
            <h4>Registro de Ventas</h4>

            <table class="table table-striped">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Vendedor</th>
                        <th>Fecha</th>
                        <th>Total</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="v : ${ventas}">

                       
                        <td th:text="${v.idVenta}">1</td>

                        
                        <td th:text="${v.cliente.nombre}">Laura</td>

                        
                        <td th:text="${v.vendedor.nombre}">Juan</td>

                        
                        <td th:text="${#temporals.format(v.fecha, 'dd/MM/yy')}">21/04/26</td>

                       
                        <td th:text="${'$' + v.total}">₡2795</td>

                    </tr>   

                </tbody>

            </table>

        </div>

    </body>
</html>
