<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{general/fragmentos :: head}"></head>

    <body>

        <header th:replace="~{general/fragmentos :: header}"></header>

        <div class="container mt-4" style="max-width:600px;">

            <h4 th:text="${usuario.idUsuario == null ? 'Agregar Vendedor' : 'Modificar Vendedor'}">
                Vendedor
            </h4>

            <form th:action="@{/admin/vendedores/guardar}" method="post" th:object="${usuario}">

                <input type="hidden" th:field="*{idUsuario}"/>

                <div class="mb-3">
                    <label>Nombre</label>
                    <input type="text" class="form-control" th:field="*{nombre}" required>
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" class="form-control" th:field="*{email}" required>
                </div>

                <div class="mb-3">
                    <label>Contraseña</label>
                    <input type="password" class="form-control" th:field="*{password}" required>
                </div>

                <div class="mb-3">
                    <label>Rol</label>
                    <select class="form-control" th:field="*{rol}" required>
                        <option value="">Seleccionar rol</option>
                        <option th:each="r : ${roles}"
                                th:value="${r}"
                                th:text="${r}">
                        </option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary">
                    Guardar
                </button>

                <a th:href="@{/admin/vendedores}" class="btn btn-secondary">
                    Cancelar
                </a>

            </form>

        </div>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>

    </body>
</html>
